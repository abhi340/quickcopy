<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#6366f1" />
  <title>QuickCopy</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>">
  <link rel="manifest" href="manifest.json">
  <link rel="preload" href="style.css" as="style">
  <link rel="modulepreload" href="src/app.js">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <style>
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #6366f1;
      font-family: 'Inter', sans-serif;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(99, 102, 241, 0.2);
      border-radius: 50%;
      border-top-color: #6366f1;
      animation: spin 1s ease-in-out infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <noscript>
    <div style="text-align:center; padding:2rem; background:#fee; color:#d32f2f; font-family:sans-serif;">
      <h2>JavaScript Required</h2>
      <p>QuickCopy needs JavaScript to function. Please enable it and reload.</p>
    </div>
  </noscript>

  <div id="app">
    <div class="loading-container">
      <svg class="spinner" viewBox="0 0 50 50">
        <circle cx="25" cy="25" r="20" fill="none" stroke="currentColor" stroke-width="5" stroke-dasharray="80, 200" stroke-dashoffset="0" stroke-linecap="round">
          <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1.5s" repeatCount="indefinite" />
        </circle>
      </svg>
      <p style="font-weight: 600; letter-spacing: 0.5px;">Initializing QuickCopy Pro...</p>
      <p id="loading-fallback" style="font-size: 0.75rem; color: #94a3b8; margin-top: 15px; display: none;">Still loading? Check your internet connection or Firebase configuration.</p>
    </div>
  </div>

  <script>
    // Show fallback message if app hasn't loaded in 8 seconds
    setTimeout(() => {
      const el = document.getElementById('loading-fallback');
      if (el) el.style.display = 'block';
    }, 8000);
  </script>

  <!-- App logic is now modularized -->
  <script type="module" src="src/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .catch(err => console.log('Service Worker registration failed: ', err));
      });
    }
  </script>
</body>
</html>
