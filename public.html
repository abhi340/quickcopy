<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Public Snippet | QuickCopy</title>
  <link rel="stylesheet" href="style.css">
<body>
  <div id="app">
    <div style="text-align:center; padding:4rem;">
      <p>Fetching shared snippet…</p>
    </div>
  </div>

  <footer class="app-footer">
    <div class="footer-links">
      <a href="about.html">About</a>
      <a href="features.html">Features</a>
      <a href="privacy.html">Privacy</a>
      <a href="changelog.html">Changelog</a>
    </div>
    <p>&copy; 2026 QuickCopy Pro. All rights reserved.</p>
  </footer>

  <script type="module">
    import { db, doc, getDoc } from './src/firebase.js';
    import { escapeHtml } from './src/utils.js';
    import { initTheme } from './src/theme.js';

    initTheme();

    async function loadPublicSnippet() {
...
      const urlParams = new URLSearchParams(window.location.search);
      const snippetId = urlParams.get('id');
      
      if (!snippetId) {
        renderError('Invalid share link.');
        return;
      }

      try {
        const docRef = doc(db, 'snippets', snippetId);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
          const data = docSnap.data();
          if (data.isPublic) {
            renderSnippet(data.text);
          } else {
            renderError('This snippet is no longer public.');
          }
        } else {
          renderError('Snippet not found.');
        }
      } catch (err) {
        renderError('Failed to load shared snippet.');
      }
    }

    function renderSnippet(text) {
      document.getElementById('app').innerHTML = `
        <div class="content-container" style="margin-top: 40px;">
          <div class="aux-header">
            <div class="aux-header-top">
               <div class="brand-label">QUICKCOPY PRO</div>
               <div style="opacity: 0.5;">Shared Snippet</div>
            </div>
            <h1 class="aux-header-title" style="background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">QuickCopy Share</h1>
          </div>
          
          <div class="glass-card">
            <div class="snippet-content" style="font-size: 1.2rem; min-height: 100px; margin-bottom: 24px;">${escapeHtml(text)}</div>
            <div style="display: flex; justify-content: center; gap: 16px;">
              <button class="btn btn-primary" id="copy-btn" style="width: auto; padding: 12px 32px;">Copy to Clipboard</button>
            </div>
            <p style="text-align:center; margin-top:20px; font-size:0.8rem; color:var(--text-dim); font-weight: 600;">securely shared via QuickCopy Pro</p>
          </div>
          
          <div style="text-align:center; margin-top:40px;">
             <p style="margin-bottom: 16px; font-size: 0.9rem; color: var(--text-dim);">Want your own secure cloud clipboard?</p>
             <button class="btn btn-outline" onclick="window.location.href='index.html'" style="margin: 0 auto;">Join QuickCopy Pro</button>
          </div>
        </div>
      `;

      document.getElementById('copy-btn').onclick = () => {
        navigator.clipboard.writeText(text);
        alert('Copied! 📋');
      };
    }

    function renderError(msg) {
      document.getElementById('app').innerHTML = `
        <div class="glass-card" style="text-align:center; padding:40px;">
          <h2 style="color:var(--accent);">Oops!</h2>
          <p>${msg}</p>
          <button class="btn btn-primary" style="margin-top:20px;" onclick="window.location.href='index.html'">Go to QuickCopy</button>
        </div>
      `;
    }

    loadPublicSnippet();
  </script>
</body>
</html>
