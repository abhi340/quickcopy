<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Settings | QuickCopy Pro</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚙️</text></svg>">
</head>
<body>
  <div id="app">
    <div id="loading-screen" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh;">
      <div class="spinner"></div>
      <p style="font-weight: 600; margin-top: 20px; color: var(--primary);">Initializing QuickCopy...</p>
      <div id="debug-log" style="margin-top: 30px; font-family: monospace; font-size: 0.7rem; color: #94a3b8; max-width: 80%; text-align: center; border: 1px solid rgba(0,0,0,0.05); padding: 10px; border-radius: 8px;">Waiting for Auth...</div>
      <button id="skip-loading" style="display:none; margin-top: 20px; background: none; border: 1px solid var(--glass-border); padding: 8px 16px; border-radius: 8px; color: var(--text-dim); cursor: pointer;">Skip Loading</button>
    </div>
  </div>

  <div id="modal-container"></div>

  <script type="module">
    import { auth, db, onAuthStateChanged, collection, getDocs, query, where, updateDoc, addDoc, deleteDoc, doc, sendEmailVerification } from './src/firebase.js';
    import { ICONS } from './src/icons.js';
    import { palettes, applyPalette, initTheme } from './src/theme.js';
    import { showToast, escapeHtml, showJokeModal } from './src/utils.js';

    let currentUser = null;
    let stats = { total: 0, active: 0, archived: 0, trash: 0, pinned: 0 };
    let hasRendered = false;

    function log(msg) {
      console.log(msg);
      const el = document.getElementById('debug-log');
      if (el) el.textContent = msg;
    }

    initTheme();

    // SHOW SKIP BUTTON IF IT TAKES TOO LONG
    setTimeout(() => {
      const skip = document.getElementById('skip-loading');
      if (skip && !hasRendered) skip.style.display = 'block';
    }, 4000);

    document.addEventListener('click', (e) => {
      if (e.target.id === 'skip-loading') {
        log("⏩ Skipping loading process...");
        renderSettings();
      }
    });

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        log("🔐 User Authenticated: " + user.email);
        currentUser = user;
        
        // Attempt to load stats, but don't block the UI if it hangs
        loadStats().then(() => {
          if (!hasRendered) renderSettings();
        }).catch(() => {
          if (!hasRendered) renderSettings();
        });

        // Forced render fallback after 3 seconds even if stats still loading
        setTimeout(() => {
          if (!hasRendered) {
            log("⏳ Load taking too long, forcing render...");
            renderSettings();
          }
        }, 3000);

      } else {
        log("⚠️ Not logged in. Redirecting...");
        window.location.href = 'index.html';
      }
    });

    async function loadStats() {
      if (!currentUser) return;
      log("📡 Fetching snippets from cloud...");
      try {
        const q = query(collection(db, 'snippets'), where('userId', '==', currentUser.uid));
        const snap = await getDocs(q);
        log("✅ Data received: " + snap.docs.length + " items.");
        const docs = snap.docs.map(d => d.data());
        stats.total = docs.length;
        stats.active = docs.filter(d => (d.status || 'active') === 'active').length;
        stats.archived = docs.filter(d => d.status === 'archived').length;
        stats.trash = docs.filter(d => d.status === 'trash').length;
        stats.pinned = docs.filter(d => d.pinned).length;
      } catch (err) { 
        log("❌ Stats failed: " + err.message);
      }
    }

    async function renderSettings() {
      if (hasRendered) return;
      hasRendered = true;
      
      const user = currentUser;
      let userName = user ? (user.displayName || user.email.split('@')[0]) : 'User';
      
      const appEl = document.getElementById('app');
      if (!appEl) return;

      log("🎨 Building UI...");

      appEl.innerHTML = `
        <div class="content-container">
          <div class="aux-header">
            <div class="aux-header-top">
              <button class="btn btn-outline" onclick="window.location.href='index.html'" style="width:auto; padding:0 16px; height:38px; font-size: 0.85rem; border-radius: 10px;">← Back to Clips</button>
              <div class="brand-label">QUICKCOPY PRO</div>
            </div>
            <h2 class="aux-header-title">Account Settings</h2>
          </div>
          
          <div class="profile-layout" style="animation: fadeIn 0.4s ease-out; padding-bottom: 40px;">
          <div class="glass-card profile-hero">
            <div class="profile-avatar">${ICONS.profile}</div>
            <h2 id="profile-name-display" style="font-size: 1.8rem; margin-bottom: 4px;">${escapeHtml(userName)}</h2>
            <p style="color: var(--text-dim); font-weight: 500;">${user ? user.email : 'No user loaded'}</p>
            
            <div style="display: flex; gap: 8px; justify-content: center; margin-top: 16px;">
              <button class="btn btn-outline" id="edit-name-btn" style="padding: 8px 16px; font-size: 0.85rem; width: auto;">Edit Name</button>
              ${(user && !user.emailVerified) ? `<button class="btn btn-primary" id="verify-email-btn" style="padding: 8px 16px; font-size: 0.85rem; width: auto; background: var(--secondary);">Verify Email</button>` : ''}
            </div>
            
            <div class="account-badge" style="margin-top: 20px; background: var(--primary); color: white; display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; letter-spacing: 1px;">PRO ACCOUNT</div>
          </div>

          <div class="glass-card">
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px; font-weight: 800; font-size: 1.1rem;">
              <span style="color: var(--primary);">${ICONS.stats}</span> Productivity Analytics
            </div>
            <div class="grid-layout-2">
              <div class="stat-item"><span class="stat-label">Total Clips</span><span class="stat-value" style="font-weight: 800; color: var(--primary);">${stats.total}</span></div>
              <div class="stat-item"><span class="stat-label">Active</span><span class="stat-value" style="font-weight: 800; color: var(--success);">${stats.active}</span></div>
              <div class="stat-item"><span class="stat-label">Pinned</span><span class="stat-value" style="font-weight: 800; color: #f59e0b;">${stats.pinned}</span></div>
              <div class="stat-item"><span class="stat-label">Archived</span><span class="stat-value" style="font-weight: 800;">${stats.archived}</span></div>
            </div>
          </div>

          <div class="grid-layout-2">
            <div class="glass-card">
              <div style="font-weight: 800; margin-bottom: 10px;">📥 Data Portability</div>
              <p style="font-size: 0.85rem; color: var(--text-dim); margin-bottom: 16px;">Download all your clips as a JSON file.</p>
              <button class="btn btn-outline" id="export-btn" style="font-size: 0.85rem; width: 100%;">Export (.json)</button>
            </div>
            <div class="glass-card">
              <div style="font-weight: 800; margin-bottom: 10px;">🧹 Maintenance</div>
              <p style="font-size: 0.85rem; color: var(--text-dim); margin-bottom: 16px;">Wipe your entire workspace. Irreversible.</p>
              <button class="btn btn-outline danger" id="clear-all-btn" style="font-size: 0.85rem; width: 100%; color: var(--accent); border-color: var(--accent);">Clear All Clips</button>
            </div>
          </div>

          <div class="glass-card">
            <h3 style="margin-bottom:16px; font-weight: 800;">Appearance Themes</h3>
            <p style="font-size: 0.85rem; color: var(--text-dim); margin-bottom: 20px;">Select a signature color palette for your Pro workspace.</p>
            <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 12px;">
              ${palettes.map(p => `
                <div class="palette-swatch ${JSON.parse(localStorage.getItem('quickcopy_palette'))?.name === p.name ? 'active' : ''}" 
                     style="background: linear-gradient(135deg, ${p.primary}, ${p.secondary}); width: 50px; height: 50px; border-radius: 12px; cursor: pointer; border: 2px solid transparent; transition: 0.2s;"
                     data-name="${p.name}" title="${p.name}"></div>
              `).join('')}
            </div>
          </div>

          <div class="glass-card" style="display: flex; flex-direction: column; align-items: center; text-align: center; gap: 12px;">
            <div style="font-weight: 800;">Enjoying QuickCopy Pro? 🎁</div>
            <p style="font-size: 0.85rem; color: var(--text-dim);">Support the development of new professional tools.</p>
            <button id="joke-btn-settings" class="btn btn-primary" style="margin-top: 8px; background: #f59e0b;">
                <span style="font-size: 1.1rem; margin-right: 8px;">🎁</span> Donate
            </button>
          </div>

          <div class="glass-card" style="border: 1px solid rgba(244, 63, 94, 0.3); background: rgba(244, 63, 94, 0.05);">
            <div style="font-weight: 800; color: var(--accent); margin-bottom: 10px;">⚠️ Danger Zone</div>
            <p style="font-size: 0.85rem; color: var(--text-dim); margin-bottom: 16px;">Permanently delete account and all cloud data.</p>
            <button class="btn btn-outline danger" id="delete-acc-btn" style="width: 100%; background: white; color: var(--accent); border-color: var(--accent); font-size: 0.85rem;">Delete Pro Account</button>
          </div>
        </div>

        <footer class="app-footer">
          <div class="footer-links">
            <a href="about.html">About</a>
            <a href="features.html">Features</a>
            <a href="privacy.html">Privacy</a>
            <a href="changelog.html">Changelog</a>
          </div>
          <p>&copy; 2026 QuickCopy Pro. All rights reserved.</p>
        </footer>
      `;

      // Event Listeners
      document.getElementById('edit-name-btn').onclick = () => showEditNameModal(userName);
      document.getElementById('export-btn').onclick = exportClips;
      document.getElementById('clear-all-btn').onclick = clearAllClips;
      document.getElementById('delete-acc-btn').onclick = confirmDeleteAccount;
      if (document.getElementById('verify-email-btn')) {
        document.getElementById('verify-email-btn').onclick = verifyEmail;
      }
      
      const jBtnSettings = document.getElementById('joke-btn-settings');
      if (jBtnSettings) jBtnSettings.onclick = showJokeModal;

      document.querySelectorAll('.palette-swatch').forEach(swatch => {
        swatch.onclick = () => {
          const p = palettes.find(pal => pal.name === swatch.dataset.name);
          if (p) { applyPalette(p); renderSettings(); }
        };
      });
    }

    function showEditNameModal(currentName) {
      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.innerHTML = `
        <div class="modal-content">
          <h2>Update Name</h2>
          <input type="text" id="new-name-input" value="${escapeHtml(currentName)}" placeholder="Your name" />
          <div class="modal-actions">
            <button class="btn btn-outline" id="close-modal">Cancel</button>
            <button class="btn btn-primary" id="save-name">Save Changes</button>
          </div>
        </div>
      `;
      document.getElementById('modal-container').appendChild(modal);
      
      const input = document.getElementById('new-name-input');
      input.focus();
      input.select();

      document.getElementById('close-modal').onclick = () => modal.remove();
      document.getElementById('save-name').onclick = async () => {
        const val = input.value.trim();
        if (val) {
          try {
            const q = query(collection(db, 'users'), where('uid', '==', currentUser.uid));
            const snap = await getDocs(q);
            if (!snap.empty) {
              await updateDoc(doc(db, 'users', snap.docs[0].id), { name: val });
            } else {
              await addDoc(collection(db, 'users'), { uid: currentUser.uid, name: val, email: currentUser.email, createdAt: new Date().toISOString() });
            }
            showToast('Name updated! ✨');
            modal.remove();
            document.getElementById('profile-name-display').textContent = val;
          } catch (e) { showToast('Update failed.', '❌'); }
        }
      };
    }

    async function verifyEmail() {
      try {
        await sendEmailVerification(auth.currentUser);
        showToast('Verification email sent! 📧');
      } catch (e) { showToast('Action failed.', '❌'); }
    }

    async function exportClips() {
      try {
        const q = query(collection(db, 'snippets'), where('userId', '==', currentUser.uid));
        const snap = await getDocs(q);
        const data = snap.docs.map(d => ({ text: d.data().text, status: d.data().status || 'active', pinned: d.data().pinned || false, tags: d.data().tags || [], createdAt: d.data().createdAt }));
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `QuickCopy_Export.json`; a.click();
        showToast('Export successful! 📥');
      } catch (e) { showToast('Export failed.', '❌'); }
    }

    async function clearAllClips() {
      if (confirm("Permanently delete ALL clips? This is irreversible.")) {
        try {
          const q = query(collection(db, 'snippets'), where('userId', '==', currentUser.uid));
          const snap = await getDocs(q);
          await Promise.all(snap.docs.map(d => deleteDoc(doc(db, 'snippets', d.id))));
          showToast('Workspace cleared! 🧹');
          // Update stats locally
          stats = { total: 0, active: 0, archived: 0, trash: 0, pinned: 0 };
          renderSettings();
        } catch (e) { showToast('Action failed.', '❌'); }
      }
    }

    function confirmDeleteAccount() {
      if (confirm('DANGER: Delete account and all data?')) {
        auth.currentUser.delete().then(() => window.location.href = 'index.html').catch(e => alert("Please logout and login again before deleting."));
      }
    }
  </script>
</body>
</html>
