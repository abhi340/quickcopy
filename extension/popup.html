<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --primary: #6366f1;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(0, 0, 0, 0.08);
      --text: #1e293b;
      --text-dim: #64748b;
      --bg: #f8fafc;
    }
    body {
      width: 340px;
      padding: 0;
      margin: 0;
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }
    .app-container { padding: 16px; }
    
    /* Auth Screen */
    #auth-screen { display: none; text-align: center; padding: 20px; }
    #auth-screen h2 { margin-bottom: 20px; font-weight: 800; color: var(--primary); }
    #auth-screen input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      box-sizing: border-box;
      outline: none;
    }
    #auth-screen input:focus { border-color: var(--primary); }
    
    /* App Screen */
    #app-screen { display: none; }
    .header {
      font-weight: 800;
      font-size: 1rem;
      margin-bottom: 16px;
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .search-box { position: relative; margin-bottom: 16px; }
    .search-box input {
      width: 100%;
      padding: 10px 12px 10px 36px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.85rem;
      outline: none;
      box-sizing: border-box;
    }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.4; }
    
    .results-list { max-height: 240px; overflow-y: auto; margin-bottom: 16px; }
    .result-item {
      padding: 10px;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      margin-bottom: 8px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.2s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .result-item:hover { border-color: var(--primary); transform: translateY(-1px); }
    
    .result-item-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      margin-bottom: 8px;
      transition: 0.2s;
      cursor: grab;
    }
    .result-item-wrapper:active { cursor: grabbing; }
    .result-item-wrapper.dragging { opacity: 0.5; background: #f1f5f9; border-style: dashed; }
    
    .drag-handle {
      padding-left: 12px;
      color: #cbd5e1;
      font-size: 1.2rem;
      user-select: none;
    }
    
    .result-item {
      flex: 1;
      padding: 12px 12px 12px 0;
      background: none;
      border: none;
      margin-bottom: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sync-area { border-top: 1px solid #e2e8f0; padding-top: 16px; margin-top: 8px; }
    textarea {
      width: 100%;
      height: 60px;
      padding: 12px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      margin-bottom: 12px;
      font-size: 0.85rem;
      resize: none;
      box-sizing: border-box;
      font-family: inherit;
      outline: none;
      transition: 0.2s;
    }
    textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }

    .btn {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .footer { margin-top: 12px; display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--text-dim); }
    .footer a { color: var(--text-dim); text-decoration: none; }
    
    #error-msg { color: #ef4444; font-size: 0.75rem; margin-top: 8px; display: none; }
    .loading-dots:after { content: ' .'; animation: dots 1s steps(5, end) infinite; }
    @keyframes dots { 0%, 20% { content: ' .'; } 40% { content: ' . .'; } 60% { content: ' . . .'; } 80%, 100% { content: ''; } }
  </style>
</head>
<body>
  <div class="app-container">
    
    <!-- Login Screen -->
    <div id="auth-screen">
      <h2>QuickCopy Pro</h2>
      <p style="font-size: 0.8rem; color: var(--text-dim); margin-bottom: 20px;">Please sign in to access your clips.</p>
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">
      <button class="btn" id="login-btn">Sign In</button>
      
      <div style="margin: 16px 0; display: flex; align-items: center; gap: 8px; opacity: 0.3;">
        <hr style="flex:1; border:0; border-top:1px solid var(--text);"> <span>OR</span> <hr style="flex:1; border:0; border-top:1px solid var(--text);">
      </div>

      <button class="btn" id="google-btn" style="background:#fff; color:#1f2937; border:1px solid #e5e7eb; display:flex; align-items:center; justify-content:center; gap:10px;">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" height="18">
        Continue with Google
      </button>

      <p style="font-size: 0.75rem; margin-top: 20px;">
        New to QuickCopy? <a href="#" id="signup-link" style="color:var(--primary); font-weight:700; text-decoration:none;">Create Account</a>
      </p>
      <div id="error-msg"></div>
    </div>

    <!-- Main App Screen -->
    <div id="app-screen">
      <div class="header">
        <span>QuickCopy Pro 📋</span>
        <button id="logout-btn" style="background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:0.7rem;">Logout</button>
      </div>

      <div class="search-box">
        <div class="search-icon">🔍</div>
        <input type="text" id="search-input" placeholder="Search your brain...">
      </div>

      <div class="results-list" id="results-list">
        <div style="text-align:center; padding:20px; color:var(--text-dim); font-size:0.8rem;" class="loading-dots">Fetching clips</div>
      </div>

      <div class="sync-area">
        <textarea id="snippet-text" placeholder="Quick sync to cloud..."></textarea>
        <button class="btn" id="sync-btn">Sync to Cloud</button>
      </div>

      <div class="footer">
        <span id="user-email">...</span>
        <span>Cloud Sync Active</span>
      </div>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
